<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><a href="day.html" class="title-link">2026 Calendar</a></h1>
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prevMonthBtn" class="month-nav">&lt; Prev</button>
                <div id="monthLabel" class="month-label"></div>
                <button id="nextMonthBtn" class="month-nav">Next &gt;</button>
            </div>
            <div class="calendar" id="calendar"></div>
        </div>
    </div>

    <!-- Modal for day input -->
    <div class="modal" id="dayModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Schedule for <span id="modalDate"></span></h2>
            <div id="entriesList" class="entries-list"></div>
            <input type="text" id="dayInput" placeholder="Add item (e.g., 11:30 for 6-11:30, s for soccer, y for yoga)">
            <button id="addBtn">Add</button>
            <button id="closeBtn">Close</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
